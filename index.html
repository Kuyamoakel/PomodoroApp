<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMODORO</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="pomodoro-container">
            <div class="break hidden">
                Break
            </div>
            <div id="timer">
                25:00
            </div>
            <div class="button-container">
                <button class="start-button" id="start" onclick="clickingSound()">START</button>
                <button class="pause-button" id="pause" onclick="clickingSound()">PAUSE</button>
                <button class="restart-button" id="restart" onclick="clickingSound()">RESTART</button>
            </div>
        </div>
    </main>
    <script src="pomodoro.js"></script>
</body>

</html>
